<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Anomaly Detection System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #141E30, #243B55);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      padding: 40px;
      text-align: center;
    }
    .btn-custom {
      border-radius: 50px;
      padding: 10px 25px;
      font-size: 1.1rem;
      margin: 10px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="card col-md-6">
    <h1 class="mb-4">Smart Anomaly Detection System</h1>
    <p class="mb-4">Upload your dataset, train models, and visualize performance metrics in one click!</p>
    <div>
      <a href="/upload/" class="btn btn-success btn-custom">Upload Dataset</a>
      <a href="/run/existing/" class="btn btn-warning btn-custom">Run Existing Models</a>
      <a href="/run/propose/" class="btn btn-primary btn-custom">Run AutoEncoder</a>
      <a href="/run/lstm/" class="btn btn-danger btn-custom">Run LSTM</a>
      <a href="/graph/" class="btn btn-info btn-custom">View Graph</a>
    </div>
  </div>
</body>
</html>

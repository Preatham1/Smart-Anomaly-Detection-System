<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📊 Algorithm Performance Graph</title>
<style>
body {
  background: linear-gradient(120deg, #1c1c1c, #2b5876, #4e4376);
  font-family: "Poppins", sans-serif;
  text-align: center;
  color: white;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 40px;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
  font-weight: 600;
  animation: fadeUp 1s ease-in-out;
}

img {
  margin-top: 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: fadeUp 1.3s ease-in-out;
}

img:hover {
  transform: scale(1.03);
  box-shadow: 0 0 45px rgba(0, 224, 255, 0.6);
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

button {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background-color: #17a2b8;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background-color: #00c3ff;
  box-shadow: 0 0 20px #00e0ff;
  transform: scale(1.05);
}
</style>
</head>
<body>
  <h1>📊 Algorithm Performance Graph</h1>

  {% if graph %}
    <img src="data:image/png;base64,{{ graph }}" alt="Graph" width="900">
  {% else %}
    <p>No graph available yet. Run your models to generate one.</p>
  {% endif %}

  <div>
    <button onclick="window.location.href='/upload/'">⬅ Back to Dashboard</button>
  </div>
  <!-- 🌗 Theme Toggle Button -->
<button id="theme-toggle" style="
position: fixed;
top: 20px;
right: 20px;
padding: 10px 15px;
border-radius: 30px;
border: none;
font-weight: 500;
background-color: #00c3ff;
color: #1c1c1c;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 0 10px rgba(0, 224, 255, 0.6);
">
🌙 Dark Mode
</button>
<script>
const toggleBtn = document.getElementById("theme-toggle");
let darkMode = true;

toggleBtn.addEventListener("click", () => {
if (darkMode) {
  document.body.style.background = "linear-gradient(120deg, #f5f5f5, #dfe9f3)";
  document.body.style.color = "#1a1a1a";
  toggleBtn.innerText = "☀️ Light Mode";
  toggleBtn.style.backgroundColor = "#1c1c1c";
  toggleBtn.style.color = "white";
} else {
  document.body.style.background = "linear-gradient(120deg, #1c1c1c, #2b5876, #4e4376)";
  document.body.style.color = "white";
  toggleBtn.innerText = "🌙 Dark Mode";
  toggleBtn.style.backgroundColor = "#00c3ff";
  toggleBtn.style.color = "#1c1c1c";
}
darkMode = !darkMode;
});
</script>
</body>
</html>
